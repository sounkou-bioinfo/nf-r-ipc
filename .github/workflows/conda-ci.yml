name: nf-r-ipc Conda CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  conda-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NFR_TEST_CONDA: '1'
      NFR_TEST_CONDA_EXE: /usr/share/miniconda/bin/conda
      NFR_TEST_CONDA_PREFIX: /usr/share/miniconda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: base

      - name: Install R runtime deps in base conda
        run: |
          /usr/share/miniconda/bin/conda run -p /usr/share/miniconda Rscript -e "install.packages('nanoarrow', repos='https://cloud.r-project.org')"

      - name: Build and test
        run: ./gradlew test --tests nextflow.nfr.integration.CondaLauncherIntegrationTest
