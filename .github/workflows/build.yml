name: nf-r-ipc CI
on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '*'
jobs:
  build:
    name: Build nf-r-ipc
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java_version: [17, 21]
        nextflow_version: ['24.10', '25.04']

    steps:
      - name: Environment
        run: env | sort

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup Java ${{ matrix.java_version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{matrix.java_version}}
          architecture: x64
          distribution: 'temurin'

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R runtime deps
        run: |
          Rscript -e "install.packages(c('nanoarrow','rmarkdown'), repos='https://cloud.r-project.org')"

      - name: Tests
        run: make test
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'

      - name: Setup Nextflow ${{ matrix.nextflow_version }}
        uses: nf-core/setup-nextflow@b9f764e8ba5c76b712ace14ecbfcef0e40ae2dd8 # v1
        with:
          version: "${{ matrix.nextflow_version }}"

      - name: Install
        run: make install

      - name: Test
        run: |
          nextflow run validation/ -plugins nf-r-ipc@0.2.1
          nextflow run validation/channels_main.nf -plugins nf-r-ipc@0.2.1
          nextflow run validation/channels_from_main.nf -plugins nf-r-ipc@0.2.1

      - name: Test channel error flow
        run: nextflow run validation/channels_error_main.nf -plugins nf-r-ipc@0.2.1

      - name: Check README sync
        run: ./bin/check-readme-sync.sh
